<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Temporary snapshot photo placeholder</title>
  <desc id="desc">A polished illustrated placeholder for a shared snapshot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="1" y2="0">
      <stop stop-color="#e0f2fe"/>
      <stop offset=".45" stop-color="#fae8ff"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g transform="rotate(4 600 450)">
    <rect x="270" y="110" width="660" height="680" rx="46" fill="#ffffff"/>
    <rect x="325" y="175" width="550" height="410" rx="34" fill="#1e293b"/>
    <circle cx="500" cy="360" r="92" fill="#fda4af"/>
    <circle cx="700" cy="360" r="92" fill="#93c5fd"/>
    <path d="M380 540c70-78 160-102 220-55 60-47 150-23 220 55" fill="none" stroke="#f8fafc" stroke-width="26" stroke-linecap="round"/>
    <text x="600" y="690" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#111827">SNAPSHOT</text>
  </g>
</svg>
