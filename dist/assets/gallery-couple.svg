<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Temporary couple celebration photo placeholder</title>
  <desc id="desc">A vivid illustrated placeholder for a couple memory photo.</desc>
  <defs>
