      <stop stop-color="#312e81"/>
      <stop offset=".52" stop-color="#db2777"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".42" r=".58">
      <stop stop-color="#fff7ed" stop-opacity=".85"/>
      <stop offset=".58" stop-color="#fff7ed" stop-opacity=".12"/>
      <stop offset="1" stop-color="#fff7ed" stop-opacity="0"/>
